<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Food Store</title>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-card__logo">Food Store</div>
      <h1 class="auth-card__title">Iniciar sesión</h1>
      <p class="auth-card__subtitle">Usa tu cuenta para continuar</p>

      <form id="form" class="auth-form">
        <div class="auth-form__group">
          <label for="email" class="auth-form__label">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            class="auth-form__input"
            required
            autocomplete="off"
            placeholder="Introduce tu correo" />
        </div>
        <div class="auth-form__group">
          <label for="password" class="auth-form__label">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            class="auth-form__input"
            required
            autocomplete="off"
            placeholder="Escribe tu contraseña" />
        </div>

        <button type="submit" class="auth-form__button">Siguiente</button>
      </form>
      
      <p class="auth-card__footer">
        ¿No tienes cuenta? <a href="/src/pages/auth/registro/registro.html" class="auth-card__link">Crear cuenta</a>
      </p>
    </div>

    <script type="module" src="./login.ts"></script>
  </body>
</html>

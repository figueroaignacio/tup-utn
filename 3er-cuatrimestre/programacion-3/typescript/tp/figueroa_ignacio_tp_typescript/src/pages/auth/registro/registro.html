<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Food Store</title>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-card__logo">Food Store</div>
      <h1 class="auth-card__title">Crear una cuenta</h1>
      <p class="auth-card__subtitle">Regístrate para continuar</p>

      <form id="registro-form" class="auth-form">
        <div class="auth-form__group">
          <label for="email" class="auth-form__label">Correo electrónico</label>
          <input type="email" id="email" class="auth-form__input" required placeholder="Introduce tu correo" />
        </div>
        <div class="auth-form__group">
          <label for="password" class="auth-form__label">Contraseña</label>
          <input type="password" id="password" class="auth-form__input" required placeholder="Escribe tu contraseña" />
        </div>
        
        <button type="submit" class="auth-form__button">Registrarse</button>
      </form>
      
      <p class="auth-card__footer">
        ¿Ya tienes cuenta? <a href="/src/pages/auth/login/login.html" class="auth-card__link">Inicia sesión</a>
      </p>
    </div>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store | Login by Ignacio Figueroa</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1 class="card__title">Food Store</h1>
        <p class="card__subtitle">Iniciar Sesión</p>
        <form action="#" method="POST" class="card__form">
          <div class="card__group">
            <label for="email" class="card__label">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              class="card__input"
              placeholder="tucorreo@ejemplo.com"
              required
            />
          </div>
          <div class="card__group">
            <label for="password" class="card__label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="card__input"
              placeholder="Minimo 8 caracteres"
              required
            />
          </div>
          <button type="submit" class="card__button">Iniciar Sesión</button>
        </form>
        <div class="card__footer">
          <p class="card__footer-text">
            ¿No tienes una cuenta?
            <a href="#" class="card__link">Registrate</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>

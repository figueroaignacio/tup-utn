<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Home</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="../store.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">
        <i class="fas fa-utensils"></i>
        Food Store
      </h1>
      <nav class="header__nav">
        <a href="../cart/cart.html" class="header__link">
          <i class="fas fa-shopping-cart"></i>
          Ver Carrito
        </a>
      </nav>
    </header>

    <main class="main-content">
      <section class="filters">
        <input
          type="text"
          id="search-input"
          class="filters__search"
          placeholder="Busca tu comida favorita..." />
        <div id="categories-list" class="filters__categories">
          <!-- Botones de categorías se renderizan aquí -->
        </div>
      </section>

      <section id="products-grid" class="products-grid">
        <!-- Tarjetas de productos se renderizan aquí -->
      </section>
    </main>

    <script type="module" src="./home.ts"></script>
  </body>
</html>
